# GitHub Actions CI workflow — PREVIEW
# Activation: copy this file to .github/workflows/ci.yml in the repo root and push to GitHub.
#
# Implements AISalon-Team-Plan-V3.0 §4.2 Pre-Deploy Checklist (Goal 2: Deploy Stability).
# Runs on every PR to main and every push to main. Blocks merge on red.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref — saves CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Prisma needs a DATABASE_URL at build time even if we don't connect.
      # Use a placeholder SQLite URL for CI — migrations are NOT applied here.
      DATABASE_URL: "file:./ci-placeholder.db"
      NEXTAUTH_SECRET: "ci-placeholder-secret-do-not-use-in-prod"
      NEXTAUTH_URL: "http://localhost:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for branch reconciliation checks

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for Playwright / Lighthouse later)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
        continue-on-error: false  # hard fail — per plan §10 Backend Dev KPIs

      - name: Typecheck
        run: bunx tsc --noEmit
        continue-on-error: false

      - name: Build
        run: bun run build
        env:
          SKIP_DB_MIGRATIONS: "true"  # do not run prisma migrate in CI
        continue-on-error: false

      - name: Upload build artifact (for downstream debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 7

  smoke-test:
    name: Production Smoke Test (post-deploy only)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Runs ONLY when main is pushed — this is the post-deploy verification step
    # per plan §4.2 item 4. Vercel auto-deploys on push to main, then this job
    # verifies the deploy is healthy.
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Wait for Vercel deploy to settle
        run: sleep 30  # give Vercel ~30s to promote the new deployment

      - name: Run smoke test against production
        run: node scripts/prod-smoke-test-extended.mjs
        env:
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          # If not set, falls back to eze@massapro.com with magic-link flow
